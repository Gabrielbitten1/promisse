name: EngiShield CI/CD — Deploy Hostinger Cloud

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    name: Build e Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependencias do backend
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Instalar dependencias do frontend
        working-directory: ./frontend
        run: npm ci

      - name: Build do frontend (exportacao estatica)
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy via SSH para Hostinger
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/htdocs/lightgoldenrodyellow-mink-532860.hostingersite.com

            git fetch origin master
            git reset --hard origin/master

            npm ci --omit=dev
            npx prisma generate
            npx prisma migrate deploy

            cd frontend
            npm ci
            npm run build
            cd ..

            pm2 restart engishield-api --update-env || pm2 start server.js --name engishield-api
            pm2 save

            echo "Deploy concluido em $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
